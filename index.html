<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKPINK Art Theme</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:#ff1493;
filter:blur(150px);
opacity:0.25;
animation:move 8s infinite alternate;
}

@keyframes move{
from{
transform:translate(-100px,-50px);
}
to{
transform:translate(100px,50px);
}
}

.container{
width:90%;
height:85vh;
display:flex;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:30px;
overflow:hidden;
box-shadow:0 0 40px rgba(255,20,147,0.4);
position:relative;
z-index:2;
}

.left{
width:45%;
display:flex;
justify-content:center;
align-items:center;
background:#0d0d0d;
}

.left img{
width:80%;
border-radius:20px;
box-shadow:
0 0 20px #ff1493,
0 0 50px rgba(255,20,147,0.7);
transition:0.5s;
}

.left img:hover{
transform:scale(1.05);
}

.right{
width:55%;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

.small{
letter-spacing:5px;
color:#ff69b4;
margin-bottom:20px;
font-weight:bold;
}

h1{
font-size:4rem;
margin-bottom:25px;
line-height:1.1;
}

.pink{
color:#ff1493;
text-shadow:0 0 15px #ff1493;
}

p{
font-size:1.1rem;
line-height:1.8;
color:#ddd;
max-width:600px;
margin-bottom:30px;
}

.buttons{
display:flex;
gap:20px;
}

button{
padding:15px 28px;
border:none;
border-radius:50px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:0.4s;
}

.primary{
background:#ff1493;
color:white;
}

.primary:hover{
transform:translateY(-5px);
box-shadow:0 0 25px #ff1493;
}

.secondary{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
}

.secondary:hover{
background:rgba(255,255,255,0.08);
}

@media(max-width:900px){

.container{
flex-direction:column;
height:auto;
}

.left,.right{
width:100%;
}

.right{
padding:40px;
}

h1{
font-size:2.5rem;
}

}

</style>
</head>

<body>

<div class="container">

<div class="left">

<!-- YOUR IMAGE -->
<img src="distort.png" alt="Artwork">

</div>

<div class="right">

<div class="small">BLACKPINK INSPIRED</div>

<h1>
NEON <span class="pink">DREAMS</span>
</h1>

<p>
A BLACKPINK-inspired futuristic art experience with glowing neon visuals,
dark luxury aesthetics, K-pop energy, and modern digital expression.
</p>

<div class="buttons">
<button class="primary">Enter Stage</button>
<button class="secondary">Gallery</button>
</div>

</div>

</div>

</body>
</html>
