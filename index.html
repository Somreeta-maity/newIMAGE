<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BLACKPINK Art Theme</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      background:linear-gradient(135deg,#000000,#120012,#ff1493);
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .bg-glow{
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      background:#ff1493;
      filter:blur(140px);
      opacity:0.25;
      animation:float 6s ease-in-out infinite;
    }

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-30px);}
      100%{transform:translateY(0px);}
    }

    .container{
      width:90%;
      max-width:1200px;
      height:80vh;
      display:flex;
      border-radius:30px;
      overflow:hidden;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.06);
      box-shadow:0 0 50px rgba(255,20,147,0.3);
      position:relative;
      z-index:10;
    }

    .left{
      width:45%;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .left img{
      width:80%;
      border-radius:20px;
      box-shadow:
      0 0 20px #ff1493,
      0 0 50px rgba(255,20,147,0.5);
      transition:0.5s;
    }

    .left img:hover{
      transform:scale(1.05) rotate(-2deg);
    }

    .right{
      width:55%;
      padding:60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .tag{
      color:#ff69b4;
      letter-spacing:4px;
      margin-bottom:15px;
      font-weight:bold;
    }

    h1{
      font-size:4rem;
      line-height:1.1;
      margin-bottom:25px;
    }

    .pink{
      color:#ff1493;
      text-shadow:0 0 20px #ff1493;
    }

    p{
      color:#ddd;
      line-height:1.8;
      font-size:1.1rem;
      margin-bottom:30px;
      max-width:600px;
    }

    .buttons{
      display:flex;
      gap:20px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-size:1rem;
      font-weight:bold;
      transition:0.4s;
    }

    .primary{
      background:#ff1493;
      color:white;
      box-shadow:0 0 20px rgba(255,20,147,0.5);
    }

    .primary:hover{
      transform:translateY(-5px);
      box-shadow:0 0 35px rgba(255,20,147,0.8);
    }

    .secondary{
      background:transparent;
      border:1px solid rgba(255,255,255,0.4);
      color:white;
    }

    .secondary:hover{
      background:rgba(255,255,255,0.08);
    }

    .music-bars{
      position:absolute;
      bottom:30px;
      right:30px;
      display:flex;
      gap:6px;
    }

    .bar{
      width:8px;
      background:#ff1493;
      border-radius:20px;
      animation:bounce 1s infinite ease-in-out;
    }

    .bar:nth-child(1){height:20px;}
    .bar:nth-child(2){height:35px; animation-delay:0.2s;}
    .bar:nth-child(3){height:50px; animation-delay:0.4s;}
    .bar:nth-child(4){height:25px; animation-delay:0.6s;}

    @keyframes bounce{
      0%,100%{
        transform:scaleY(1);
      }
      50%{
        transform:scaleY(1.7);
      }
    }

    @media(max-width:900px){

      .container{
        flex-direction:column;
        height:auto;
      }

      .left,.right{
        width:100%;
      }

      .right{
        padding:40px;
      }

      h1{
        font-size:2.8rem;
      }
    }

  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <div class="container">

    <div class="left">
      <!-- INSERT YOUR IMAGE NAME BELOW -->
      <img src="C:\Users\DELL\OneDrive\Pictures\Screenshots\distort.png" alt="Artwork">
    </div>

    <div class="right">

      <div class="tag">BLACKPINK INSPIRED EXPERIENCE</div>

      <h1>
        DARK <span class="pink">ART</span><br>
        MEETS K-POP
      </h1>

      <p>
        A futuristic BLACKPINK-inspired visual experience combining neon pink aesthetics,
        dramatic shadows, modern digital art, and powerful feminine energy.
        Your artwork becomes the centerpiece of an immersive luxury concert-style webpage.
      </p>

      <div class="buttons">
        <button class="primary">Enter Stage</button>
        <button class="secondary">View Gallery</button>
      </div>

    </div>

  </div>

  <div class="music-bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

</body>
</html>
